<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Usage Control</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Light (default) ── */
    :root, [data-theme="light"] {
      --bg:          #f4f4f1;
      --card:        #ffffff;
      --border:      rgba(0,0,0,0.09);
      --border-hi:   rgba(0,0,0,0.18);
      --text:        rgba(0,0,0,0.45);
      --text-hi:     rgba(0,0,0,0.87);
      --track:       rgba(0,0,0,0.08);
      --accent:      #6366f1;
      --accent-bg:   rgba(99,102,241,0.10);
      --danger-fill: #f87171;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:      10px;
      --radius-sm:   6px;
    }

    /* ── Dark ── */
    [data-theme="dark"] {
      --bg:          #0e0e14;
      --card:        #17171f;
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(255,255,255,0.16);
      --text:        rgba(255,255,255,0.45);
      --text-hi:     rgba(255,255,255,0.92);
      --track:       rgba(255,255,255,0.08);
      --accent:      #818cf8;
      --accent-bg:   rgba(129,140,248,0.12);
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .hdr-logo { display: flex; align-items: center; gap: 8px; }


    .hdr-icon { width: 24px; height: 24px; color: var(--accent); }

    .hdr-title { font-size: 12px; font-weight: 700; color: var(--text-hi); }
    .hdr-sub   { font-size: 9px;  color: var(--text); margin-top: 1px; }

    .hdr-actions { display: flex; align-items: center; gap: 5px; }

    /* ── Icon buttons ── */
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      padding: 4px 6px;
      line-height: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .btn-icon svg   { width: 12px; height: 12px; display: block; }
    .spinning       { animation: spin .6s linear infinite; }

    /* ── Theme icon swap ──
       Light mode → show moon (click to go dark)
       Dark  mode → show sun  (click to go light)          */
    #icon-sun                      { display: none;  }
    #icon-moon                     { display: block; }
    [data-theme="dark"] #icon-sun  { display: block; }
    [data-theme="dark"] #icon-moon { display: none;  }

    /* ── States ── */
    #state-loading {
      padding: 28px 14px;
      text-align: center;
      color: var(--text);
    }
    #state-error {
      padding: 20px 14px;
      text-align: center;
      color: var(--danger-fill);
      font-size: 11px;
      white-space: pre-line;
      line-height: 1.5;
    }
    .state-spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 10px;
    }

    /* ── Usage rows ── */
    #state-data {
      padding: 10px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .usage-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .15s;
    }
    .usage-row:hover { border-color: var(--border-hi); }

    .usage-row-head {
      display: flex; align-items: baseline;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .usage-row-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text);
    }

    .usage-row-pct {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-hi);
      font-variant-numeric: tabular-nums;
      transition: color .3s;
    }

    .usage-track {
      height: 4px;
      background: var(--track);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .usage-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .6s cubic-bezier(.16,1,.3,1), background .4s;
    }

    .usage-row-sub { font-size: 9.5px; color: var(--text); }

    /* ── Footer ── */
    #data-footer {
      padding: 8px 12px 11px;
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .footer-org {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 9px;
      color: var(--text);
      opacity: .55;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer-ts { font-size: 9px; color: var(--text); white-space: nowrap; }

    /* ── Open button ── */
    .btn-open {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 10px;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-open:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">
      <div class="">
        <img src="icons/icon128.png" alt="Claude icon" class="hdr-icon" />
      </div>
      <div>
        <div class="hdr-title">Claude Usage</div>
        <div class="hdr-sub">Real-time limits</div>
      </div>
    </div>

    <div class="hdr-actions">

      <!-- Theme toggle: moon shown in light mode, sun in dark mode -->
      <button class="btn-icon" id="theme-btn" title="Toggle light / dark">
        <svg id="icon-sun" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.54 11.54l1.41 1.41M3.05 12.95l1.42-1.41M11.54 4.46l1.41-1.41"
                stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7z"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Refresh -->
      <button class="btn-icon" id="refresh-btn" title="Refresh">
        <svg id="refresh-icon" viewBox="0 0 16 16" fill="none">
          <path d="M13.6 2.4A7 7 0 1 0 14.5 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M14.5 2v3.5H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="btn-open" id="open-btn">claude.ai ↗</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="state-loading">
    <div class="state-spinner"></div>
    Fetching usage data…
  </div>

  <!-- Error -->
  <div id="state-error" style="display:none"></div>

  <!-- Data -->
  <div id="state-data" style="display:none">

    <div class="usage-row" id="row-five">
      <div class="usage-row-head">
        <span class="usage-row-label">Current session:</span>
        <span class="usage-row-pct" id="pct-five">—</span>
      </div>
      <div class="usage-track"><div class="usage-fill" id="fill-five"></div></div>
      <span class="usage-row-sub" id="sub-five"></span>
    </div>

    <div class="usage-row" id="row-seven">
      <div class="usage-row-head">
        <span class="usage-row-label">Weekly:</span>
        <span class="usage-row-pct" id="pct-seven">—</span>
      </div>
      <div class="usage-track"><div class="usage-fill" id="fill-seven"></div></div>
      <span class="usage-row-sub" id="sub-seven"></span>
    </div>

    <div class="usage-row" id="row-extra" style="display:none">
      <div class="usage-row-head">
        <span class="usage-row-label">Extra usage</span>
        <span class="usage-row-pct" id="pct-extra">—</span>
      </div>
      <div class="usage-track"><div class="usage-fill" id="fill-extra"></div></div>
      <span class="usage-row-sub" id="sub-extra"></span>
    </div>

  </div>

  <div id="data-footer" style="display:none">
    <span class="footer-org" id="footer-org"></span>
    <span class="footer-ts"  id="footer-ts"></span>
  </div>

  <script src="utils/apiClient.js"></script>
  <script src="popup.js"></script>

</body>
</html>
